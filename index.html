<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company App - Identifiner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="logo">🏢</div>
        <h1>Welcome to Identifiner</h1>
        <p>Company Management System</p>
        <div class="button-container">
            <button onclick="goToAdminLogin()" class="btn admin-btn">
                <span class="btn-icon">👑</span>
                <div>
                    <div class="btn-title">Admin Login</div>
                    <div class="btn-subtitle">Access admin dashboard</div>
                </div>
            </button>
            <button onclick="goToStaffLogin()" class="btn staff-btn">
                <span class="btn-icon">👤</span>
                <div>
                    <div class="btn-title">Staff Login</div>
                    <div class="btn-subtitle">Access staff portal</div>
                </div>
            </button>
        </div>
        <p class="api-status">
            <div id="api-status">
                <span class="status-indicator status-offline"></span>
                Checking API status...
            </div>
        </p>
    </div>
    <script src="script.js"></script>
    <script>
        // Check API status
        async function checkApiStatus() {
            try {
                const response = await fetch('/api/test-simple');
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('api-status').innerHTML = `
                        <span class="status-indicator status-online"></span>
                        API Online - ${data.userStats.total} users (${data.userStats.admins} admins, ${data.userStats.staff} staff)
                    `;
                } else {
                    throw new Error('API returned error');
                }
            } catch (error) {
                document.getElementById('api-status').innerHTML = `
                    <span class="status-indicator status-offline"></span>
                    API Offline - Please check connection
                `;
            }
        }

        // Check API status on page load
        checkApiStatus();
    </script>
</body>
</html>
