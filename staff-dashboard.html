<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard - Company Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="logo">👤</div>
        <h1>Staff Dashboard</h1>
        <p>Welcome to your staff portal</p>
        
        <div id="userInfo" class="user-info">
            <p>Loading user information...</p>
        </div>
        
        <div class="dashboard-actions">
            <button class="btn staff-btn" onclick="logout()">Logout</button>
        </div>
        
        <div class="api-status">
            <div id="api-status">
                <span class="status-indicator status-offline"></span>
                Checking API status...
            </div>
        </div>
    </div>

    <script>
        // Check authentication on page load
        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('token');
            const user = localStorage.getItem('user');
            
            if (!token || !user) {
                alert('Please log in first');
                window.location.href = '/staff-login.html';
                return;
            }
            
            try {
                const userData = JSON.parse(user);
                if (userData.role !== 'staff') {
                    alert('Access denied. Staff access required.');
                    window.location.href = '/';
                    return;
                }
                
                document.getElementById('userInfo').innerHTML = `
                    <h3>Welcome, ${userData.name}!</h3>
                    <p>Email: ${userData.email}</p>
                    <p>Role: ${userData.role}</p>
                `;
            } catch (error) {
                console.error('Error parsing user data:', error);
                logout();
            }
            
            checkApiStatus();
        });
        
        async function logout() {
            try {
                const token = localStorage.getItem('token');
                if (token) {
                    await fetch('/api/auth-logout', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                        },
                    });
                }
            } catch (error) {
                console.error('Logout error:', error);
            }
            
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/';
        }
        
        async function checkApiStatus() {
            try {
                const response = await fetch('/api/test-simple');
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('api-status').innerHTML = `
                        <span class="status-indicator status-online"></span>
                        API Online - ${data.userStats.total} users (${data.userStats.admins} admins, ${data.userStats.staff} staff)
                    `;
                } else {
                    throw new Error('API returned error');
                }
            } catch (error) {
                document.getElementById('api-status').innerHTML = `
                    <span class="status-indicator status-offline"></span>
                    API Offline - Please check connection
                `;
            }
        }
    </script>
</body>
</html>
