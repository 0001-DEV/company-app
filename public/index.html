<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Management System</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 {
            color: #333;
            margin-bottom: 1rem;
        }
        .subtitle {
            color: #666;
            margin-bottom: 2rem;
        }
        .login-options {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .login-btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 5px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: block;
        }
        .admin-btn {
            background: #4CAF50;
            color: white;
        }
        .admin-btn:hover {
            background: #45a049;
            transform: translateY(-2px);
        }
        .staff-btn {
            background: #2196F3;
            color: white;
        }
        .staff-btn:hover {
            background: #1976D2;
            transform: translateY(-2px);
        }
        .api-status {
            margin-top: 2rem;
            padding: 1rem;
            background: #f5f5f5;
            border-radius: 5px;
            font-size: 0.9rem;
        }
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .status-online {
            background: #4CAF50;
        }
        .status-offline {
            background: #f44336;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Company Management System</h1>
        <p class="subtitle">Welcome to Xtreme Cr8ivity</p>
        
        <div class="login-options">
            <a href="/admin-login" class="login-btn admin-btn">Admin Login</a>
            <a href="/staff-login" class="login-btn staff-btn">Staff Login</a>
        </div>
        
        <div class="api-status">
            <div id="api-status">
                <span class="status-indicator status-offline"></span>
                Checking API status...
            </div>
        </div>
    </div>

    <script>
        // Check API status
        async function checkApiStatus() {
            try {
                const response = await fetch('/api/test');
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('api-status').innerHTML = `
                        <span class="status-indicator status-online"></span>
                        API Online - ${data.userStats.total} users (${data.userStats.admins} admins, ${data.userStats.staff} staff)
                    `;
                } else {
                    throw new Error('API returned error');
                }
            } catch (error) {
                document.getElementById('api-status').innerHTML = `
                    <span class="status-indicator status-offline"></span>
                    API Offline - Please check connection
                `;
            }
        }

        // Check API status on page load
        checkApiStatus();
    </script>
</body>
</html>
